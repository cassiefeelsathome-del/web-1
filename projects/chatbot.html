<!DOCTYPE html>
<html lang="en">
  <head>
    <title>ChatBot</title>
    <style>
      body{
        font-family: "Pixelated MS Sans Serif";
        margin-top: 0px;
        margin-bottom: 0px;
      }
      .send-button{
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }
      .chat-textbox{
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;
        flex-grow: 1;
      }
      .chat-input-container{
        display: flex;
        margin-bottom: 60px;
      }
      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;
      }
      .chat-message-chatbot{
        display: flex;
        justify-content: start;
        align-items: start;
      }
      .chat-message-text{
        background-color: rgb(243, 243, 243);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }
      .chat-message-profile {
        width: 45px;
      }
      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>
    <link   rel="stylesheet"   href="https://unpkg.com/98.css">

    
   <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

 
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      function ChatInput({chatMessages, setChatMessages}){
        const [inputText, setInputText] = React.useState('');

        function saveInputText(event){
          setInputText(event.target.value);
          

        }

        function sendMessage(){
          const newChatMessages = [
              ...chatMessages,
              {
                message: inputText,
                sender: 'User',
                id: crypto.randomUUID()

              }
          ]

            setChatMessages(newChatMessages);

          const response = Chatbot.getResponse(inputText);
          setChatMessages([
              ...newChatMessages,
              {
                message: response,
                sender: 'ChatBot',
                id: crypto.randomUUID()

              }
          ]);
          
          setInputText('');        
        }

        return(
          <div className="chat-input-container">
            <input 
              placeholder="Send a message..." 
              size = "50"
              onChange={saveInputText}
              value = {inputText}
              className = "chat-textbox"
              onKeyDown={(event) => {
                if (event.key === 'Enter') {
                  sendMessage();
                }
              }}
            />
            <button
              onClick = {sendMessage}
              className = 'send-button'
            >Send</button>
          </div>
        );
      };

      function ChatMessage({message, sender}){

        
        return(
          <div className={
            sender === 'User' 
            ? 'chat-message-user' 
            : 'chat-message-chatbot'
          }>
            {sender === 'ChatBot' &&  (
              <img className ="chat-message-profile" src ="https://i.pinimg.com/originals/ff/65/de/ff65def7e836801cf919bbe03e0c3dce.png"/>
            )}
            <div className= "chat-message-text">
              {message}
            </div>
            {sender === 'User' && (
              <img className ="chat-message-profile" src ="https://fivepointsdentalnj.com/wp-content/uploads/2015/11/anonymous-user.png" />
             )}
          </div>

        )
      };

      function ChatMessages({chatMessages}) {
        const chatMesagesRef = React.useRef(null);

        React.useEffect(() =>{
          const containerElm = chatMesagesRef.current;
          if(containerElm){
            containerElm.scrollTop = containerElm.scrollHeight;
          }
        }, [chatMessages]);
        return(
          <div className="chat-messages-container"
          ref={chatMesagesRef}>
            {chatMessages.map((chatMessage) => {
              return(
                <ChatMessage 
                message = {chatMessage.message}
                sender = {chatMessage.sender} 
                key = {chatMessage.id}
                />
              );
            })}
          </div>
        ) 
      }

      function App() {
         const [chatMessages, setChatMessages] = React.useState([]);
        // above is const [chatMessages, setChatMessages] = array;
        
        return (
          <div className="app-container">
            <ChatMessages 
              chatMessages ={chatMessages}
            />            

            <ChatInput 
              chatMessages ={chatMessages}
              setChatMessages = {setChatMessages}
            />

          </div>
        );
      }
      


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
